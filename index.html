<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  
<!-- link css -->
 <link rel="stylesheet" href="./styles.css">
 
  </head>
  <body>
    <!-- ===================== LOGIN PAGE ===================== -->
    <div id="login-page">
      <div class="login-card">
        <div class="login-logo">
         <img src="./assets/github-logo.png" alt="">
        </div>
        <h1>GitHub Issues Tracker</h1>
        <p>Sign in to manage your issues</p>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter Username" />
          <div class="default-hint">Default: admin</div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter Password" />
          <div class="default-hint">Default: admin123</div>
        </div>

        <div class="login-error" id="login-error">
          Invalid username or password.
        </div>

        <button class="btn-signin" onclick="handleLogin()">Sign In</button>

        <div class="or-divider">OR</div>

        <div class="demo-box">
          <p>Demo Credentials:</p>
          <strong>Username:</strong> admin<br />
          <strong>Password:</strong> admin123
        </div>
      </div>
    </div>

    <div id="main-page">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="nav-left"><a class="nav-brand" href="#">
          <img src="./assets/github-logo.png" alt="">
          <p>GitHub Issues Tracker</p>
          </a>       
        </div>
        <div class="nav-right">
          <div class="search-wrap">
            <svg
              class="search-icon"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              class="search-input"
              id="search-input"
              placeholder="Search issues..."
              oninput="handleSearch(this.value)"
            />
          </div>
          <button class="btn-new-issue">
            <svg
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            New Issue
          </button>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Tabs -->
        <div class="tab-section">
          <div class="tabs">
            <button class="tab-btn active" onclick="setTab('all', this)">
              All
            </button>
            <button class="tab-btn" onclick="setTab('open', this)">Open</button>
            <button class="tab-btn" onclick="setTab('closed', this)">
              Closed
            </button>
          </div>
        </div>

        <!-- Issues Header -->
        <div class="issues-header">
          <div class="issues-header-left">
            <div class="issues-icon">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z" />
                <path
                  fill-rule="evenodd"
                  d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0z"
                />
              </svg>
            </div>
            <div>
              <div class="issues-count" id="issues-count">0 Issues</div>
              <div class="issues-subtext">
                Track and manage your project issues
              </div>
            </div>
          </div>
          <div class="legend">
            <div class="legend-item">
              <div class="dot dot-green"></div>
              Open
            </div>
            <div class="legend-item">
              <div class="dot dot-purple"></div>
              Closed
            </div>
          </div>
        </div>

        <!-- Cards -->
        <div class="cards-grid" id="cards-grid">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

     <!-- Modal -->
    <div
      id="modal-overlay"
      class="modal-overlay"
      style="display: none"
      onclick="closeModalOutside(event)"
    >
      <div class="modal" id="modal-content">
        <!-- filled by JS -->
      </div>
    </div>

        <script>
      const API_BASE = "https://phi-lab-server.vercel.app/api/v1/lab";
      let allIssues = [];
      let currentTab = "all";
      let searchTimeout = null;
      let isSearching = false;

      // ===================== AUTH =====================
      function handleLogin() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        const err = document.getElementById("login-error");

        if (u === "admin" && p === "admin123") {
          err.style.display = "none";
          document.getElementById("login-page").style.display = "none";
          document.getElementById("main-page").style.display = "block";
          loadAllIssues();
        } else {
          err.style.display = "block";
        }
      }

      // Allow pressing Enter in inputs
      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
      document.getElementById("username") &&
        document.getElementById("username").addEventListener("keydown", (e) => {
          if (e.key === "Enter") handleLogin();
        });

      // ===================== DATA LOADING =====================
      async function loadAllIssues() {
        showSpinner();
        try {
          const res = await fetch(`${API_BASE}/issues`);
          const data = await res.json();
          allIssues = Array.isArray(data)
            ? data
            : data.issues || data.data || [];
          renderIssues(allIssues);
        } catch (e) {
          showError("Failed to load issues. Please try again.");
        }
      }

      // ===================== TAB =====================
      function setTab(tab, btn) {
        currentTab = tab;
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        // Clear search
        document.getElementById("search-input").value = "";
        isSearching = false;

        if (tab === "all") {
          renderIssues(allIssues);
        } else {
          const filtered = allIssues.filter(
            (i) => (i.status || "").toLowerCase() === tab,
          );
          renderIssues(filtered);
        }
      }

      // ===================== SEARCH =====================
      function handleSearch(q) {
        clearTimeout(searchTimeout);
        q = q.trim();

        if (!q) {
          isSearching = false;
          setTabDisplay();
          return;
        }

        isSearching = true;
        searchTimeout = setTimeout(async () => {
          showSpinner();
          try {
            const res = await fetch(
              `${API_BASE}/issues/search?q=${encodeURIComponent(q)}`,
            );
            const data = await res.json();
            const results = Array.isArray(data)
              ? data
              : data.issues || data.data || [];
            renderIssues(results);
          } catch {
            // fallback: local filter
            const filtered = allIssues.filter(
              (i) =>
                (i.title || "").toLowerCase().includes(q.toLowerCase()) ||
                (i.description || "").toLowerCase().includes(q.toLowerCase()),
            );
            renderIssues(filtered);
          }
        }, 400);
      }

      function setTabDisplay() {
        if (currentTab === "all") renderIssues(allIssues);
        else {
          const filtered = allIssues.filter(
            (i) => (i.status || "").toLowerCase() === currentTab,
          );
          renderIssues(filtered);
        }
      }

      // ===================== RENDER =====================
      function renderIssues(issues) {
        const grid = document.getElementById("cards-grid");
        const count = document.getElementById("issues-count");
        count.textContent = `${issues.length} Issue${issues.length !== 1 ? "s" : ""}`;

        if (!issues.length) {
          grid.innerHTML = `<div class="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><dot cx="12" cy="16" r="1"/></svg>
        <p>No issues found</p>
      </div>`;
          return;
        }

        grid.innerHTML = issues.map((issue) => issueCard(issue)).join("");
      }

      function issueCard(issue) {
        const isOpen = (issue.status || "").toLowerCase() === "open";
        const priority = (issue.priority || "LOW").toUpperCase();
        const labels = Array.isArray(issue.labels)
          ? issue.labels
          : issue.label
            ? [issue.label]
            : [];
        const date = issue.createdAt
          ? new Date(issue.createdAt).toLocaleDateString("en-US", {
              month: "numeric",
              day: "numeric",
              year: "numeric",
            })
          : "";
        const author = issue.author || issue.user || "unknown";
        const num = issue.id || issue._id || issue.number || "";

        return `<div class="issue-card ${isOpen ? "open" : "closed"}" onclick="openModal(${num})">
      <div class="card-top">
        <span class="card-status-icon">
          ${
            isOpen
              ? `<svg fill="none" stroke="#22c55e" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><circle cx="12" cy="16" r="0.5" fill="#22c55e"/></svg>`
              : `<svg fill="none" stroke="#a855f7" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="9,12 11,14 15,10"/></svg>`
          }
        </span>
        <span class="priority-badge priority-${priority}">${priority}</span>
      </div>
      <div class="card-title">${escHtml(issue.title || "Untitled")}</div>
      <div class="card-desc">${escHtml(issue.description || "")}</div>
      <div class="card-labels">${labels.map((l) => labelBadge(l)).join("")}</div>
      <div class="card-meta">
        <span class="issue-num">#${num} by ${escHtml(String(author))}</span><br/>
        <span>${date}</span>
      </div>
    </div>`;
      }

      function labelBadge(label) {
        if (!label) return "";
        const l = label.toLowerCase().replace(/\s/g, "-");
        let cls = "label-default";
        if (l.includes("bug")) cls = "label-bug";
        else if (l.includes("enhancement")) cls = "label-enhancement";
        else if (l.includes("help")) cls = "label-help";
        else if (l.includes("question")) cls = "label-question";
        else if (l.includes("doc")) cls = "label-documentation";

        const icon = l.includes("bug")
          ? "🐛"
          : l.includes("enhancement")
            ? "✨"
            : l.includes("help")
              ? "🙏"
              : l.includes("question")
                ? "❓"
                : "🏷";
        return `<span class="label-badge ${cls}">${icon} ${escHtml(label)}</span>`;
      }

      // ===================== MODAL =====================
      async function openModal(id) {
        if (!id) return;
        document.getElementById("modal-overlay").style.display = "flex";
        document.getElementById("modal-content").innerHTML =
          `<div class="spinner-wrap"><div class="spinner"></div></div>`;

        try {
          const res = await fetch(`${API_BASE}/issue/${id}`);
          const data = await res.json();
          const issue = data.issue || data.data || data;
          renderModal(issue);
        } catch {
          // Fallback: find in local cache
          const issue = allIssues.find(
            (i) => String(i.id || i._id || i.number) === String(id),
          );
          if (issue) renderModal(issue);
          else
            document.getElementById("modal-content").innerHTML =
              `<p>Failed to load issue details.</p><button class="btn-close" onclick="closeModal()">Close</button>`;
        }
      }

      function renderModal(issue) {
        const isOpen = (issue.status || "").toLowerCase() === "open";
        const priority = (issue.priority || "LOW").toUpperCase();
        const labels = Array.isArray(issue.labels)
          ? issue.labels
          : issue.label
            ? [issue.label]
            : [];
        const date = issue.createdAt
          ? new Date(issue.createdAt).toLocaleDateString("en-US", {
              month: "2-digit",
              day: "2-digit",
              year: "numeric",
            })
          : "N/A";
        const author = issue.author || issue.user || "N/A";
        const assignee = issue.assignee || issue.assignedTo || author;
        const category = issue.category || issue.type || "N/A";

        document.getElementById("modal-content").innerHTML = `
      <h2>${escHtml(issue.title || "Untitled")}</h2>
      <div class="modal-status-row">
        <span class="status-pill ${isOpen ? "status-open" : "status-closed"}">${isOpen ? "Opened" : "Closed"}</span>
        <span class="modal-meta-text">Opened by <strong>${escHtml(String(author))}</strong> • ${date}</span>
      </div>
      <div class="modal-labels">${labels.map((l) => labelBadge(l)).join("")}</div>
      <div class="modal-desc">${escHtml(issue.description || "No description provided.")}</div>
      <div class="modal-detail-grid">
  <div class="detail-box">
    <div class="label">Assignee:</div>
    <div class="value">${escHtml(String(assignee))}</div>
  </div>
  <div class="detail-box">
    <div class="label">Priority:</div>
    <div class="value"><span class="priority-badge priority-${priority}">${priority}</span></div>
  </div>
</div>
      <button class="btn-close" onclick="closeModal()">Close</button>
    `;
      }

      function closeModal() {
        document.getElementById("modal-overlay").style.display = "none";
      }

      function closeModalOutside(e) {
        if (e.target === document.getElementById("modal-overlay")) closeModal();
      }

      // ===================== UTILS =====================
      function showSpinner() {
        document.getElementById("cards-grid").innerHTML =
          `<div class="spinner-wrap"><div class="spinner"></div></div>`;
      }

      function showError(msg) {
        document.getElementById("cards-grid").innerHTML =
          `<div class="empty-state"><p>${msg}</p></div>`;
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>

     </body>
</html>
